name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run knip
      - run: bun run check-types
      - run: bun run test
