name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

env:
  TAXKIT_ACTION_PIN_UPDATE_OWNER: taxkit-ci-release-maintainer

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run check:quality-workflow
      - run: bun run release:check -- --ci
